{% set name = "whl2conda" %}
{% set version = "26.7.2" %}

package:
  name: whl2conda
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/w/whl2conda/whl2conda-{{ version }}.tar.gz
  sha256: 8d12f53a80d8626bf57e1159b1e8746401f4999ac46cfedcfec74091ab2268b0

build:
  entry_points:
    - whl2conda = whl2conda.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - conda-package-handling >=2.2
    - packaging >=23
    - platformdirs >=3.10
    - pyyaml >=6.0
    - tomlkit >=0.12
    - wheel >=0.41

test:
  imports:
    - whl2conda.api
  commands:
    - pip check
    - whl2conda convert --help
  requires:
    - pip
    - requests
    - python {{ python_min }}

about:
  summary: build conda packages directly from pure python wheels
  home: https://github.com/zuzukin/whl2conda
  doc_url: https://zuzukin.github.io/whl2conda/
  license: Apache-2.0
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - analog-cbarber
